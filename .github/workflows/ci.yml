name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 src/ tests/ --max-line-length=120 --ignore=E501,W503,E203 || true

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short -x

      - name: Smoke test training pipeline
        run: |
          python -c "
          from src.data.mock_data import generate_mock_dataset
          generate_mock_dataset('data/mock_dataset', images_per_class=8, image_size=32)
          print('Mock data generated successfully')
          "
          python -m src.training.train \
            --config configs/default.yaml \
            --data-dir data/mock_dataset \
            --epochs 1 \
            --backbone efficientnet_b0 \
            --batch-size 4 \
            --checkpoint-dir outputs/ci_checkpoints
